name: macOS deployment

#on: [push, pull_request]

on:
  workflow_dispatch:
  push:
     branches:
       - master

jobs:
  macos-build:
     name: MacOS Build
     strategy:
       matrix:
         os: [macos-latest]

     runs-on: ${{ matrix.os }}

     steps:
     - name: Install Dependencies
       run: |
         unset HOMEBREW_NO_INSTALL_FROM_API
         brew update
         brew upgrade || true
         brew install qt6
         brew link qt6 --force
         brew install hamlib
         brew link hamlib --force
         brew install qtkeychain
         brew install dbus-glib
         brew install brotli
         brew install icu4c
         brew install pkg-config
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         submodules: recursive
     - name: Get version from tag
       run : |
         TAGVERSION=$(git describe --tags)
         echo "TAGVERSION=${TAGVERSION:1}" >> $GITHUB_ENV

     - name: Configure and compile
       run: |
         mkdir build
         cd build
         qmake -config release ..
         make -j4
     - name: Build app
       run: |
         cd build
         macdeployqt qlog.app -executable=./qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app -always-overwrite -verbose=3 -qmldir=..
         ICU_PATH=$(brew --prefix icu4c)/lib
         cp `brew --prefix`/lib/libhamlib.dylib qlog.app/Contents/Frameworks/libhamlib.dylib
         cp `brew --prefix`/lib/libqt6keychain.dylib qlog.app/Contents/Frameworks/libqt6keychain.dylib
         cp `brew --prefix`/lib/libdbus-1.dylib qlog.app/Contents/Frameworks/libdbus-1.dylib
         cp `brew --prefix`/lib/libbrotlicommon.1.dylib qlog.app/Contents/Frameworks/libbrotlicommon.1.dylib
         cp $ICU_PATH/libicui18n*.dylib qlog.app/Contents/Frameworks/
         cp `brew --prefix`/lib/libglib-2.0.0.dylib qlog.app/Contents/Frameworks/libglib-2.0.0.dylib
         cp `brew --prefix`/lib/libbrotlidec.1.dylib qlog.app/Contents/Frameworks/libbrotlidec.1.dylib
         # Replace qt_path with the result of `brew --prefix qt6`
         qt_path=$(brew --prefix qt6)
         cp -R "$qt_path/lib/QtSvg.framework" qlog.app/Contents/Frameworks/
         cp -R "$qt_path/lib/QtVirtualKeyboard.framework" qlog.app/Contents/Frameworks/
         cp -R "$qt_path/lib/QtVirtualKeyboardQml.framework" qlog.app/Contents/Frameworks/
         
         install_name_tool -change `brew --prefix`/lib/libglib-2.0.0.dylib @executable_path/../Frameworks/libglib-2.0.0.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlidec.1.dylib @executable_path/../Frameworks/libbrotlidec.1.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlicommon.1.dylib @executable_path/../Frameworks/libbrotlicommon.1.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libhamlib.dylib @executable_path/../Frameworks/libhamlib.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libqt6keychain.dylib @executable_path/../Frameworks/libqt6keychain.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlicommon.1.dylib @executable_path/../Frameworks/libbrotlicommon.1.dylib qlog.app/Contents/MacOS/qlog 
         install_name_tool -change `brew --prefix`/opt/icu4c/lib/libicui18n.74.dylib @executable_path/../Frameworks/libicui18n.74.dylib qlog.app/Contents/MacOS/qlog
         otool -L qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app -executable=./qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app
# ... (the rest of the file is unchanged up to the Codesign app bundle step) ...

     - name: Codesign app bundle
       # Extract the secrets we defined earlier as environment variables
       env:
         MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
         MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
         MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
         MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
       run: |
         set -euo pipefail
         APP="/Users/runner/work/QLog/QLog/build/qlog.app"

         echo "Decoding certificate..."
         echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

         echo "Creating keychain..."
         security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
         security default-keychain -s build.keychain
         security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
         security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
         security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

         echo "Listing bundle contents (sanity)..."
         find "$APP" -maxdepth 4 -print || true

         echo "Looking for QtWebEngineProcess and other nested .app helpers..."
         find "$APP" -name "*.app" -print

         echo "Signing nested .app helpers (QtWebEngineProcess etc.) individually..."
         find "$APP" -name "*.app" -type d -print0 | while IFS= read -r -d '' SUBAPP; do
           echo "Signing $SUBAPP"
           /usr/bin/codesign --timestamp -s "$MACOS_CERTIFICATE_NAME" --options runtime --force "$SUBAPP" || true
         done

         echo "Signing frameworks and dylibs..."
         if [ -d "$APP/Contents/Frameworks" ]; then
           find "$APP/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.framework" \) -print0 \
             | while IFS= read -r -d '' F; do
               echo "Signing $F"
               /usr/bin/codesign --timestamp -s "$MACOS_CERTIFICATE_NAME" --options runtime --force "$F" || true
             done
         fi

         echo "Signing main executable inside app (the executable file)..."
         if [ -f "$APP/Contents/MacOS/qlog" ]; then
           /usr/bin/codesign --timestamp -s "$MACOS_CERTIFICATE_NAME" --options runtime --force "$APP/Contents/MacOS/qlog" || true
         fi

         echo "Final sign of the app bundle (top-level)..."
         /usr/bin/codesign --timestamp -s "$MACOS_CERTIFICATE_NAME" --options runtime --force "$APP"

         echo "Verify codesign of top-level app:"
         /usr/bin/codesign -v --verbose=4 "$APP" || true

         echo "Gatekeeper check (spctl):"
         spctl -a -t exec -vv "$APP" || true

         echo "Check for QtWebEngineProcess binary linkages (if found):"
         find "$APP" -name "QtWebEngineProcess.app" -print0 | while IFS= read -r -d '' P; do
           B="$P/Contents/MacOS/$(ls "$P/Contents/MacOS" | head -n1)"
           echo "otool -L $B"
           otool -L "$B" || true
         done
     - name: "Notarize app bundle"
         # Extract the secrets we defined earlier as environment variables
       env:
           PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
           PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
           PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
       run: |
           # Store the notarization credentials so that we can prevent a UI password dialog
           # from blocking the CI

           echo "Create keychain profile"
           xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"
           
           echo "Creating temp notarization archive"
           ditto -c -k --keepParent "/Users/runner/work/QLog/QLog/build/qlog.app" "notarization.zip"

           # Here we send the notarization request to the Apple's Notarization service, waiting for the result.
           # This typically takes a few seconds inside a CI environment, but it might take more depending on the App
           # characteristics. Visit the Notarization docs for more information and strategies on how to optimize it if
           # you're curious

           echo "Notarize app"
           xcrun notarytool submit "notarization.zip" --keychain-profile "notarytool-profile" --wait

           echo "Attach staple"
           xcrun stapler staple "/Users/runner/work/QLog/QLog/build/qlog.app"   
     - name: make dmg
       run: |
         DMG_NAME="QLog.v${TAGVERSION}.dmg"
         mkdir out
         cp -R "/Users/runner/work/QLog/QLog/build/qlog.app" out
         cd out
         ln -s /Applications/ Applications
         cd ..
         hdiutil create -volname "QLog Installer" -srcfolder out -ov -format UDZO "/Users/runner/work/QLog/QLog/build/$DMG_NAME"
     - name: Codesign dmg bundle
         # Extract the secrets we defined earlier as environment variables
       env: 
           MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
           MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
           MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
           MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
       run: |
           # Turn our base64-encoded certificate back to a regular .p12 file
           ##echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
           # We need to create a new keychain, otherwise using the certificate will prompt
           # with a UI dialog asking for the certificate password, which we can't
           # use in a headless CI environment
           ##security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
           ##security default-keychain -s build.keychain
           ##security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
           ##security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
           ##security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
           # We finally codesign our app bundle, specifying the Hardened runtime option
           /usr/bin/codesign --timestamp -s "$MACOS_CERTIFICATE_NAME" --options runtime --deep -f /Users/runner/work/QLog/QLog/build/$DMG_NAME
     - name: "Notarize app bundle"
         # Extract the secrets we defined earlier as environment variables
       env:
           PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
           PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
           PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
       run: |
           # Store the notarization credentials so that we can prevent a UI password dialog
           # from blocking the CI

           echo "Create keychain profile"
           xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"
           
           echo "Creating temp notarization archive"
           ditto -c -k --keepParent "/Users/runner/work/QLog/QLog/build/$DMG_NAME" "notarization.zip"

           # Here we send the notarization request to the Apple's Notarization service, waiting for the result.
           # This typically takes a few seconds inside a CI environment, but it might take more depending on the App
           # characteristics. Visit the Notarization docs for more information and strategies on how to optimize it if
           # you're curious

           echo "Notarize app"
           xcrun notarytool submit "notarization.zip" --keychain-profile "notarytool-profile" --wait

           echo "Attach staple"
           xcrun stapler staple "/Users/runner/work/QLog/QLog/build/$DMG_NAME"           
     - name: Copy artifact
       uses: actions/upload-artifact@v4
       with:
         name: QLog-${{ env.TAGVERSION }}-${{ matrix.os }}
         path: /Users/runner/work/QLog/QLog/build/$DMG_NAME
