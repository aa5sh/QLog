name: macOS deployment

#on: [push, pull_request]

on:
  workflow_dispatch:
  push:
     branches:
       - master

jobs:
  macos-build:
     name: MacOS Build
     strategy:
       matrix:
         os: [macos-latest]

     runs-on: ${{ matrix.os }}

     steps:
     - name: Install Dependencies
       run: |
         unset HOMEBREW_NO_INSTALL_FROM_API
         brew update
         brew upgrade || true
         brew install qt6
         brew install qtvirtualkeyboard
         brew link qt6 --force
         brew install hamlib
         brew link hamlib --force
         brew install qtkeychain
         brew install dbus-glib
         brew install brotli
         brew install icu4c
         brew install pkg-config
     - name: Checkout Code
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         submodules: recursive
     - name: Get version from tag
       run : |
         TAGVERSION=$(git describe --tags)
         echo "TAGVERSION=${TAGVERSION:1}" >> $GITHUB_ENV

     - name: Configure and compile
       run: |
         mkdir build
         cd build
         qmake -config release ..
         make -j4
     - name: Build app
       run: |
         cd build
         macdeployqt qlog.app -executable=./qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app -always-overwrite -verbose=3 -qmldir=..
         ICU_PATH=$(brew --prefix icu4c)/lib
         cp `brew --prefix`/lib/libhamlib.dylib qlog.app/Contents/Frameworks/libhamlib.dylib
         cp `brew --prefix`/lib/libqt6keychain.dylib qlog.app/Contents/Frameworks/libqt6keychain.dylib
         cp `brew --prefix`/lib/libdbus-1.dylib qlog.app/Contents/Frameworks/libdbus-1.dylib
         cp `brew --prefix`/lib/libbrotlicommon.1.dylib qlog.app/Contents/Frameworks/libbrotlicommon.1.dylib
         cp $ICU_PATH/libicui18n*.dylib qlog.app/Contents/Frameworks/
         cp `brew --prefix`/lib/libglib-2.0.0.dylib qlog.app/Contents/Frameworks/libglib-2.0.0.dylib
         cp `brew --prefix`/lib/libbrotlidec.1.dylib qlog.app/Contents/Frameworks/libbrotlidec.1.dylib

         install_name_tool -change `brew --prefix`/lib/libglib-2.0.0.dylib @executable_path/../Frameworks/libglib-2.0.0.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlidec.1.dylib @executable_path/../Frameworks/libbrotlidec.1.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlicommon.1.dylib @executable_path/../Frameworks/libbrotlicommon.1.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libhamlib.dylib @executable_path/../Frameworks/libhamlib.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libqt6keychain.dylib @executable_path/../Frameworks/libqt6keychain.dylib qlog.app/Contents/MacOS/qlog
         install_name_tool -change `brew --prefix`/lib/libbrotlicommon.1.dylib @executable_path/../Frameworks/libbrotlicommon.1.dylib qlog.app/Contents/MacOS/qlog 
         install_name_tool -change `brew --prefix`/opt/icu4c/lib/libicui18n.74.dylib @executable_path/../Frameworks/libicui18n.74.dylib qlog.app/Contents/MacOS/qlog
         otool -L qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app -executable=./qlog.app/Contents/MacOS/qlog
         macdeployqt qlog.app
# ... (the rest of the file is unchanged up to the Codesign app bundle step) ...

     - name: Codesign app bundle
       # Extract the secrets we defined earlier as environment variables
       env:
         MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
         MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
         MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
         MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
       run: |
         set -euo pipefail
         APP="/Users/runner/work/QLog/QLog/build/qlog.app"

         echo "Decoding certificate..."
         echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

         echo "Creating keychain..."
         security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
         security default-keychain -s build.keychain
         security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
         security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
         security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

         set -euo pipefail
         APP="/Users/runner/work/QLog/QLog/build/qlog.app"
        
         echo "Sign everything that is a Mach-O binary (helpers, dylibs, plugins, frameworks)"
         find "$APP" -type f -print0 | while IFS= read -r -d '' F; do
           if file "$F" | grep -q "Mach-O"; then
             echo "Signing Mach-O: $F"
             /usr/bin/codesign --force --timestamp --options runtime -s "$MACOS_CERTIFICATE_NAME" "$F"
           fi
         done
        
         echo "Finally sign the top-level app"
          /usr/bin/codesign --force --timestamp --options runtime -s "$MACOS_CERTIFICATE_NAME" "$APP"
        
         echo "Verify (strict)"
         /usr/bin/codesign --verify --deep --strict --verbose=4 "$APP"
         spctl -a -t exec -vv "$APP"
         
     - name: "Notarize app bundle"
       env:
           PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
           PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
           PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
       run: |
         set -euo pipefail

         echo "Create keychain profile"
         xcrun notarytool store-credentials "notarytool-profile" \
           --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" \
           --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" \
           --password "$PROD_MACOS_NOTARIZATION_PWD"
        
         echo "Creating temp notarization archive"
         ditto -c -k --keepParent "/Users/runner/work/QLog/QLog/build/qlog.app" "notarization.zip"
        
         echo "Notarize app (submit + wait)"
         xcrun notarytool submit "notarization.zip" \
          --keychain-profile "notarytool-profile" \
          --wait \
          --output-format json > notarization_log.json
        
         cat notarization_log.json
        
         # Extract id + status (no jq needed)
         NOTARY_ID=$(python3 -c 'import json; print(json.load(open("notarization_log.json"))["id"])')
         NOTARY_STATUS=$(python3 -c 'import json; print(json.load(open("notarization_log.json"))["status"])')
        
         echo "Notary Request ID: $NOTARY_ID"
         echo "Notary Status: $NOTARY_STATUS"
        
         echo "Fetching detailed notary log..."
         xcrun notarytool log "$NOTARY_ID" --keychain-profile "notarytool-profile" || true
        
         if [ "$NOTARY_STATUS" != "Accepted" ]; then
           echo "Notarization failed with status: $NOTARY_STATUS"
           exit 1
         fi
        
         echo "Attach staple"
         xcrun stapler staple "/Users/runner/work/QLog/QLog/build/qlog.app"
         xcrun stapler validate "/Users/runner/work/QLog/QLog/build/qlog.app"
     - name: make dmg
       run: |
        set -euo pipefail
        # use TAGVERSION, but make a nicer filename (strip the "-14-g...." if you want)
        VERSION="${TAGVERSION%%-*}"   # => "0.47.1" from "0.47.1-14-g0022e427"
        DMG_NAME="QLog.v${VERSION}.dmg"
        echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
    
        mkdir -p out
        cp -R "/Users/runner/work/QLog/QLog/build/qlog.app" out/
        ln -s /Applications out/Applications
    
        hdiutil create \
          -volname "QLog Installer" \
          -srcfolder out \
          -ov -format UDZO \
          "/Users/runner/work/QLog/QLog/build/$DMG_NAME"
    
        ls -lh "/Users/runner/work/QLog/QLog/build/$DMG_NAME"
     - name: Codesign dmg bundle
         # Extract the secrets we defined earlier as environment variables
       env: 
           MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
           MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
           MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
           MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
       run: |
        set -euo pipefail
        DMG="/Users/runner/work/QLog/QLog/build/$DMG_NAME"
        test -f "$DMG"
        /usr/bin/codesign --force --timestamp -s "$MACOS_CERTIFICATE_NAME" "$DMG"
        /usr/bin/codesign -v --verbose=4 "$DMG"
     - name: Notarize dmg
       env:
        PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
        PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
        PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
       run: |
        set -euo pipefail
        DMG="/Users/runner/work/QLog/QLog/build/$DMG_NAME"
        test -f "$DMG"
    
        xcrun notarytool store-credentials "notarytool-profile" \
          --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" \
          --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" \
          --password "$PROD_MACOS_NOTARIZATION_PWD"
    
        ditto -c -k "$DMG" "notarization.zip"
    
        xcrun notarytool submit "notarization.zip" \
          --keychain-profile "notarytool-profile" \
          --wait --output-format json > notarization_dmg.json
        cat notarization_dmg.json
    
        NOTARY_ID=$(python3 -c 'import json; print(json.load(open("notarization_dmg.json"))["id"])')
        xcrun notarytool log "$NOTARY_ID" --keychain-profile "notarytool-profile" || true
    
        xcrun stapler staple "$DMG"
        xcrun stapler validate "$DMG"        
     - name: Copy artifact
       uses: actions/upload-artifact@v4
       with:
         name: QLog-${{ env.TAGVERSION }}-macos
         path: /Users/runner/work/QLog/QLog/build/${{ env.DMG_NAME }}
